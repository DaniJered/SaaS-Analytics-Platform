<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0a0a14"/>
  <!-- Outer border -->
  <rect x="3" y="3" width="58" height="58" rx="8" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
  <!-- Mini crown -->
  <polygon points="32,8 27,18 22,14 24,20 40,20 42,14 37,18" fill="#c9a84c"/>
  <!-- Top line -->
  <line x1="8" y1="22" x2="56" y2="22" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <!-- DJ Letters -->
  <text x="32" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#c9a84c" letter-spacing="2">DJ</text>
  <!-- Bottom line -->
  <line x1="8" y1="54" x2="56" y2="54" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>
</svg>
